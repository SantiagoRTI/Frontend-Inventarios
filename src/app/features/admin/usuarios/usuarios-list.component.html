<div class="usuarios-container">
  <h2>Gestión de Usuarios</h2>

  <app-table
    [columns]="columns"
    [data]="usuarios()"
    [loading]="loading()"
    [actions]="['edit', 'delete']"
    [showAddButton]="true"
    [addButtonLabel]="'Agregar Usuario'"
    (onAction)="handleAction($event)"
    (onAdd)="showFormModal = true; resetForm()">
  </app-table>

  <!-- Modal Formulario -->
  <div class="modal-overlay" *ngIf="showFormModal" (click)="showFormModal = false">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ editingId ? 'Editar Usuario' : 'Nuevo Usuario' }}</h3>
        <button class="btn-close" (click)="showFormModal = false">
          <i class="pi pi-times"></i>
        </button>
      </div>
      <form (ngSubmit)="saveUsuario()" class="modal-body">
        <div class="form-group">
          <label>Nombre *</label>
          <input
            type="text"
            [(ngModel)]="formData.nombre"
            name="nombre"
            required
            placeholder="Nombre completo"
          />
        </div>

        <div class="form-group">
          <label>Correo Electrónico *</label>
          <input
            type="email"
            [(ngModel)]="formData.correo"
            name="correo"
            required
            placeholder="usuario@rti.com.co"
          />
        </div>

        <div class="form-group" *ngIf="!editingId">
          <label>Contraseña *</label>
          <input
            type="password"
            [(ngModel)]="formData.password"
            name="password"
            [required]="!editingId"
            placeholder="Mínimo 8 caracteres"
          />
        </div>

        <div class="form-group">
          <label>Rol *</label>
          <select [(ngModel)]="formData.rol" name="rol" required>
            <option value="">Seleccionar rol</option>
            <option value="Administrador">Administrador</option>
            <option value="Inspector">Inspector</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="showFormModal = false">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            <span *ngIf="!saving()">{{ editingId ? 'Actualizar' : 'Guardar' }}</span>
            <span *ngIf="saving()">
              <i class="pi pi-spin pi-spinner"></i> Guardando...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Confirmar Eliminación -->
  <app-confirm-delete
    [visible]="showDeleteModal"
    [title]="'Eliminar Usuario'"
    [message]="'¿Está seguro de que desea eliminar al usuario ' + deletingUsuario?.nombre + '?'"
    (onConfirm)="confirmDelete()"
    (onCancel)="showDeleteModal = false; deletingUsuario = null">
  </app-confirm-delete>
</div>
